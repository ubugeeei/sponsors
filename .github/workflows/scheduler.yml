name: scheduled update sponsors

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"
  push:
    branches:
      - main

concurrency:
  group: scheduled-update-sponsors
  cancel-in-progress: true

jobs:
  update-sponsors:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # Version is resolved from `packageManager` in package.json. Do NOT add
      # `with: version: ...` here — pnpm/action-setup@v4 errors on double-spec.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Use hosted Chrome
        run: |
          CHROME_PATH="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser)"
          if [ -z "$CHROME_PATH" ]; then
            echo "Chrome executable was not found on the runner." >&2
            exit 1
          fi
          "$CHROME_PATH" --version
          echo "PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH=$CHROME_PATH" >> "$GITHUB_ENV"

      - name: Build
        run: pnpm run build

      - name: Generate sponsors
        run: pnpm run generate
        env:
          SPONSORKIT_GITHUB_TOKEN: ${{ secrets.SPONSORKIT_GITHUB_TOKEN }}
          GITHUB_LOGIN: ubugeeei

      - name: Commit
        uses: EndBug/add-and-commit@v9
        with:
          author_name: GitHub Actions
          author_email: 41898282+github-actions[bot]@users.noreply.github.com
          message: "chore: update sponsors"
          add: "sponsors*"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
